services:
  mnemory:
    build: .
    ports:
      - "8050:8050"
    environment:
      - LLM_API_KEY=${OPENAI_API_KEY}
      - VECTOR_BACKEND=chroma
      - ARTIFACT_BACKEND=filesystem
      - CHROMA_PATH=/data/chroma
      - ARTIFACT_PATH=/data/artifacts
      - HISTORY_DB_PATH=/data/history.db
    volumes:
      - mnemory-data:/data
    restart: unless-stopped

volumes:
  mnemory-data:
