name: mnemory
version: 0.1.0
description: Persistent two-tier memory for Hermes Agent via mnemory server
author: Filip Pytloun

requires_env:
  - MNEMORY_URL

provides_tools:
  - memory_search
  - memory_find
  - memory_ask
  - memory_add
  - memory_add_batch
  - memory_update
  - memory_delete
  - memory_delete_batch
  - memory_list
  - memory_categories
  - memory_recent
  - memory_save_artifact
  - memory_get_artifact
  - memory_get_artifact_url
  - memory_list_artifacts
  - memory_delete_artifact

provides_hooks:
  - on_session_start
  - pre_llm_call
  - post_llm_call
  - on_session_end
